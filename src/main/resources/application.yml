server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dating_app?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
  profiles:
    include: local

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/dating_chat
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.data.mongodb.core.MongoTemplate: debug

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationThatIsLongEnoughForHS256Algorithm}
  access-token-validity: 1800000
  refresh-token-validity: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

openai:
  api:
    key: ${OPENAI_API_KEY:}